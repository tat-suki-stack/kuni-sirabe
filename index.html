<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="国しらべ">
<meta name="theme-color" content="#2980d9">
<title>🌍 世界の国しらべ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#2980d9;--blue-dark:#1a5fa8;--blue-light:#e8f3fd;
  --green:#27ae60;--green-light:#e8f8ee;
  --orange:#e67e22;--orange-light:#fef3e2;
  --red:#e74c3c;--red-light:#fdecea;
  --purple:#8e44ad;--purple-light:#f5eafc;
  --teal:#16a085;--teal-light:#e6f7f4;
  --gray:#7f8c8d;--gray-light:#f4f6f7;
  --text:#2c3e50;--text2:#5d6d7e;--text3:#95a5a6;
  --bg:#f0f7ff;--card:#fff;--border:#e0eaf5;
  --radius:16px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(41,128,217,0.10);
  --shadow-lg:0 4px 24px rgba(41,128,217,0.15);
}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#2980d9 0%,#1a6db8 50%,#155a99 100%);
  padding:env(safe-area-inset-top,12px) 16px 16px;
  text-align:center;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,0.15);
}
.header h1{color:#fff;font-size:20px;font-weight:900;letter-spacing:0.02em}
.header p{color:rgba(255,255,255,0.82);font-size:12px;margin-top:2px}

/* ── SEARCH ── */
.search-wrap{padding:14px 14px 8px}
.search-row{display:flex;gap:8px;align-items:center}
.search-input{
  flex:1;height:48px;border-radius:var(--radius);
  border:1.5px solid var(--border);background:var(--card);
  padding:0 14px;font-size:16px;font-family:'Nunito',sans-serif;
  color:var(--text);outline:none;transition:border 0.2s;
  box-shadow:var(--shadow);
}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--text3)}
.icon-btn{
  width:48px;height:48px;border-radius:var(--radius);
  border:1.5px solid var(--border);background:var(--card);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;color:var(--text2);
  flex-shrink:0;transition:all 0.15s;
  box-shadow:var(--shadow);
}
.icon-btn:hover{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.icon-btn.recording{background:#fdecea;border-color:var(--red);color:var(--red);animation:pulse 1s infinite}
.search-btn{
  height:48px;padding:0 18px;border-radius:var(--radius);
  background:var(--blue);color:#fff;border:none;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;white-space:nowrap;transition:opacity 0.15s;
  box-shadow:0 2px 8px rgba(41,128,217,0.3);
}
.search-btn:active{opacity:0.85}
.mic-hint{font-size:12px;color:var(--text3);text-align:center;min-height:16px;padding:4px 0}

/* ── SUGGESTIONS ── */
.suggestions-wrap{padding:0 14px 10px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.suggestions-wrap::-webkit-scrollbar{display:none}
.suggestions-inner{display:flex;gap:6px;align-items:center}
.sug-label{font-size:12px;color:var(--text3);flex-shrink:0}
.chip{
  display:inline-block;padding:6px 13px;border-radius:20px;
  background:var(--card);border:1px solid var(--border);
  font-size:13px;font-weight:700;cursor:pointer;
  color:var(--text2);flex-shrink:0;transition:all 0.15s;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.chip:active{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}

/* ── CONTINENT TABS ── */
.tabs-wrap{padding:0 14px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs-inner{display:flex;gap:6px}
.tab{
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;
  cursor:pointer;flex-shrink:0;border:1.5px solid var(--border);
  background:var(--card);color:var(--text2);transition:all 0.15s;
}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── RESULT ── */
.result-wrap{padding:0 14px 80px}

.result-card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow-lg);
  overflow:hidden;animation:slideUp 0.3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.card-hero{
  background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%);
  padding:20px 16px 16px;
  display:flex;align-items:center;gap:14px;
}
.flag-big{font-size:56px;line-height:1;flex-shrink:0}
.hero-info{flex:1;min-width:0}
.hero-info h2{color:#fff;font-size:22px;font-weight:900;margin-bottom:2px}
.hero-info .sub{color:rgba(255,255,255,0.8);font-size:13px}
.cont-badge{
  display:inline-block;margin-top:6px;
  padding:3px 10px;border-radius:12px;
  background:rgba(255,255,255,0.2);
  color:#fff;font-size:12px;font-weight:700;
}

/* stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
.stat-cell{padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.stat-cell:last-child{border-right:none}
.stat-icon{font-size:18px;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--text3);margin-bottom:1px}
.stat-val{font-size:13px;font-weight:800;color:var(--text)}

/* sections */
.sections{padding:14px}
.sec{margin-bottom:14px}
.sec:last-child{margin-bottom:0}
.sec-head{
  display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:800;color:var(--text2);
  margin-bottom:8px;
  border-left:3px solid var(--blue);padding-left:8px;
}
.sec-head i{font-size:16px;color:var(--blue)}

/* tags */
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:5px 11px;border-radius:14px;font-size:12px;font-weight:700}
.tag.industry{background:var(--green-light);color:var(--green)}
.tag.tourism{background:var(--orange-light);color:var(--orange)}
.tag.food{background:var(--red-light);color:var(--red)}
.tag.world1{background:var(--purple-light);color:var(--purple)}

/* big mac */
.bigmac-box{
  display:flex;align-items:center;gap:10px;
  background:var(--orange-light);border-radius:var(--radius-sm);
  padding:10px 14px;
}
.bigmac-price{font-size:22px;font-weight:900;color:var(--orange)}
.bigmac-label{font-size:12px;color:var(--text2)}
.bigmac-note{font-size:11px;color:var(--text3)}

/* map */
.map-box{
  border-radius:var(--radius-sm);overflow:hidden;
  border:1px solid var(--border);height:200px;
  position:relative;background:var(--blue-light);
}
.map-box iframe{width:100%;height:100%;border:none;display:block}
.map-link{
  display:block;margin-top:6px;
  padding:8px;border-radius:var(--radius-sm);
  background:var(--blue-light);
  color:var(--blue);font-size:12px;font-weight:700;
  text-align:center;text-decoration:none;
  border:1px solid var(--border);
}
.map-link i{margin-right:4px;vertical-align:-2px}

/* more btn */
.more-btn{
  display:block;width:100%;margin-top:14px;
  padding:13px;border-radius:var(--radius);
  background:var(--blue);color:#fff;border:none;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;text-align:center;
  box-shadow:0 2px 8px rgba(41,128,217,0.3);
}

/* country list */
.country-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:8px;
}
.country-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 12px;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:all 0.15s;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.country-item:active{background:var(--blue-light);border-color:var(--blue)}
.country-item .cf{font-size:24px;flex-shrink:0}
.country-item .cn{font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.country-item .cc{font-size:11px;color:var(--text3)}

/* loading / error */
.loading{text-align:center;padding:40px 16px;color:var(--text3)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;margin:0 auto 12px;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{text-align:center;padding:32px 16px}
.error-box .emoji{font-size:44px;margin-bottom:8px}
.error-box p{font-size:14px;color:var(--text2)}

/* install banner */
.install-banner{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid var(--border);
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:10px;
  box-shadow:0 -2px 12px rgba(0,0,0,0.1);
  z-index:200;animation:slideUp 0.4s ease;
}
.install-banner .icon{font-size:28px}
.install-banner .text{flex:1;font-size:13px}
.install-banner .text strong{display:block;font-size:14px;margin-bottom:1px}
.install-banner-close{
  background:var(--blue);color:#fff;border:none;
  padding:8px 14px;border-radius:var(--radius-sm);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
}
.install-banner-x{
  background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:4px;
}

/* ── MAIN NAV ── */
.main-nav{display:flex;gap:6px;justify-content:center;margin-top:10px}
.nav-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 16px;border-radius:20px;border:none;
  background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.85);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.15s;
}
.nav-btn i{font-size:15px}
.nav-btn.active{background:#fff;color:var(--blue)}
.nav-btn:active{opacity:0.8}

/* ── QUIZ ── */
.quiz-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.quiz-type-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:16px 12px;text-align:center;cursor:pointer;
  transition:all 0.15s;box-shadow:var(--shadow);
}
.quiz-type-card:active{transform:scale(0.97)}
.quiz-type-card .qt-icon{font-size:36px;margin-bottom:6px}
.quiz-type-card .qt-name{font-size:14px;font-weight:800;color:var(--text);margin-bottom:3px}
.quiz-type-card .qt-desc{font-size:11px;color:var(--text3)}
.quiz-type-card.flag-quiz{border-color:#e74c3c}
.quiz-type-card.cap-quiz{border-color:#2980d9}
.quiz-type-card.food-quiz{border-color:#e67e22}

.diff-row{display:flex;gap:8px;margin-bottom:16px}
.diff-btn{
  flex:1;padding:10px 6px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--card);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;text-align:center;transition:all 0.15s;color:var(--text2);
}
.diff-btn.active{border-width:2px}
.diff-btn.easy.active{background:#e8f8ee;border-color:var(--green);color:var(--green)}
.diff-btn.normal.active{background:#e8f3fd;border-color:var(--blue);color:var(--blue)}
.diff-btn.hard.active{background:#fdecea;border-color:var(--red);color:var(--red)}

.quiz-start-btn{
  width:100%;padding:14px;border-radius:var(--radius);
  background:var(--blue);color:#fff;border:none;
  font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;
  cursor:pointer;box-shadow:0 3px 10px rgba(41,128,217,0.35);
  transition:opacity 0.15s;margin-bottom:20px;
}
.quiz-start-btn:active{opacity:0.85}

/* quiz progress */
.quiz-progress-bar{height:8px;background:var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--blue);border-radius:4px;transition:width 0.4s ease}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px;color:var(--text2)}
.streak-badge{
  display:flex;align-items:center;gap:4px;
  background:#fff3cd;border:1px solid #ffc107;
  padding:3px 10px;border-radius:12px;
  font-size:13px;font-weight:800;color:#856404;
}
.streak-badge.hot{background:#fdecea;border-color:var(--red);color:var(--red);animation:pulse2 0.6s ease}
@keyframes pulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* question card */
.q-card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);box-shadow:var(--shadow-lg);
  padding:20px 16px;margin-bottom:14px;text-align:center;
  animation:slideUp 0.25s ease;
}
.q-flag{font-size:72px;line-height:1;margin-bottom:8px}
.q-question{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}
.q-sub{font-size:12px;color:var(--text3)}

/* choices */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.choice-btn{
  padding:13px 10px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--card);
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all 0.15s;color:var(--text);
  text-align:center;line-height:1.3;
}
.choice-btn:active{transform:scale(0.97)}
.choice-btn.correct{background:#e8f8ee;border-color:var(--green);color:var(--green)}
.choice-btn.wrong{background:#fdecea;border-color:var(--red);color:var(--red)}
.choice-btn.reveal{background:#e8f8ee;border-color:var(--green);color:var(--green)}
.choice-btn:disabled{cursor:default}

/* result feedback */
.feedback-box{
  border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;
  animation:slideUp 0.2s ease;
}
.feedback-box.correct-fb{background:#e8f8ee;border:1px solid #a3e0b8}
.feedback-box.wrong-fb{background:#fdecea;border:1px solid #f5b8b8}
.feedback-title{font-size:16px;font-weight:900;margin-bottom:4px}
.feedback-tip{font-size:13px;color:var(--text2);line-height:1.5}

.next-btn{
  width:100%;padding:13px;border-radius:var(--radius);
  background:var(--blue);color:#fff;border:none;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;box-shadow:0 2px 8px rgba(41,128,217,0.3);
}

/* result screen */
.result-screen{text-align:center;padding:20px 0}
.result-score{font-size:56px;font-weight:900;color:var(--blue);line-height:1}
.result-label{font-size:14px;color:var(--text2);margin-bottom:16px}
.result-stars{font-size:32px;margin-bottom:12px}
.result-comment{font-size:15px;font-weight:700;color:var(--text);margin-bottom:20px}
.result-stats{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;
}
.rs-cell{background:var(--bg);border-radius:var(--radius-sm);padding:10px 6px;text-align:center}
.rs-val{font-size:20px;font-weight:900;color:var(--text)}
.rs-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.result-btns{display:flex;gap:8px}
.result-btns button{
  flex:1;padding:13px;border-radius:var(--radius);
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;
}
.btn-retry{background:var(--blue);color:#fff;border:none;box-shadow:0 2px 8px rgba(41,128,217,0.3)}
.btn-menu{background:var(--card);color:var(--text);border:1.5px solid var(--border)}

/* ── RANKING ── */
.ranking-tabs{display:flex;gap:6px;margin-bottom:14px}
.rtab{
  flex:1;padding:8px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--card);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;text-align:center;color:var(--text2);transition:all 0.15s;
}
.rtab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.ranking-list{display:flex;flex-direction:column;gap:8px}
.rank-item{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.rank-num{font-size:18px;font-weight:900;min-width:28px;text-align:center}
.rank-num.gold{color:#f1c40f}
.rank-num.silver{color:#95a5a6}
.rank-num.bronze{color:#cd7f32}
.rank-info{flex:1}
.rank-name{font-size:14px;font-weight:800;color:var(--text)}
.rank-detail{font-size:12px;color:var(--text3)}
.rank-score{font-size:18px;font-weight:900;color:var(--blue)}
.rank-empty{text-align:center;padding:40px 16px;color:var(--text3);font-size:14px}
.rank-empty .big{font-size:40px;margin-bottom:8px}
.name-input-wrap{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.name-input-wrap label{font-size:13px;font-weight:700;color:var(--text2);display:block;margin-bottom:6px}
.name-input{
  width:100%;padding:10px 12px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);font-family:'Nunito',sans-serif;
  font-size:15px;color:var(--text);outline:none;
}
.name-input:focus{border-color:var(--blue)}
.save-btn{
  width:100%;margin-top:8px;padding:11px;border-radius:var(--radius-sm);
  background:var(--blue);color:#fff;border:none;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;
}
.sec-title{font-size:15px;font-weight:900;color:var(--text);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
</style>
</head>
<body>

<div class="header">
  <h1>🌍 世界の国しらべ</h1>
  <div class="main-nav">
    <button class="nav-btn active" id="navSearch" onclick="showPage('search')"><i class="ti ti-search"></i>しらべる</button>
    <button class="nav-btn" id="navQuiz" onclick="showPage('quiz')"><i class="ti ti-brain"></i>クイズ</button>
    <button class="nav-btn" id="navRanking" onclick="showPage('ranking')"><i class="ti ti-trophy"></i>ランキング</button>
  </div>
</div>

<div id="page-search">
<div class="search-wrap">
  <div class="search-row">
    <input class="search-input" id="inp" type="text" placeholder="国名を入力（例：フランス、ブラジル）" autocomplete="off">
    <button class="icon-btn" id="micBtn" aria-label="音声入力"><i class="ti ti-microphone"></i></button>
    <button class="search-btn" id="searchBtn">しらべる</button>
  </div>
  <p class="mic-hint" id="micHint"></p>
</div>

<div class="suggestions-wrap">
  <div class="suggestions-inner" id="chips">
    <span class="sug-label">例：</span>
  </div>
</div>

<div style="padding:0 14px 8px">
  <div class="tabs-wrap" style="padding:0">
    <div class="tabs-inner" id="tabs"></div>
  </div>
</div>

<div class="result-wrap" id="result">
  <div class="country-grid" id="countryGrid"></div>
</div>
</div><!-- end page-search -->

<div id="installBanner" style="display:none"></div>

<!-- QUIZ PAGE -->
<div id="page-quiz" style="display:none">
  <div id="quiz-inner" style="padding:14px 14px 80px"></div>
</div>

<!-- RANKING PAGE -->
<div id="page-ranking" style="display:none">
  <div id="ranking-inner" style="padding:14px 14px 80px"></div>
</div>

<script>
// ═══════════════════════════════════════
// DATA: 50カ国

  });

  // Tabs
  const tabsEl = document.getElementById('tabs');
  CONTINENTS.forEach(c => {
    const t = document.createElement('div');
    t.className = 'tab' + (c === 'すべて' ? ' active' : '');

    t.onclick = () => {
      currentContinent = c;
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      showGrid();
    };
    tabsEl.appendChild(t);
  });

  showGrid();
  setupMic();
  setupPWA();

  document.getElementById('searchBtn').onclick = () => search();
  document.getElementById('inp').addEventListener('keydown', e => { if(e.key==='Enter') search(); });
}

function resolve(q) {
  const t = q.trim();
  if (COUNTRIES[t]) return t;
  const l = t.toLowerCase();
  if (ALIASES[l]) return ALIASES[l];
  for (const k of Object.keys(COUNTRIES)) {
    if (k.includes(t) || t.includes(k)) return k;
  }
  return null;
}

function search(q) {
  const query = q || document.getElementById('inp').value;
  if (!query.trim()) return;
  const key = resolve(query);
  if (!key) {
    document.getElementById('result').innerHTML = `
      <div class="error-box">
        <div class="emoji">🤔</div>
        <p>「${query}」は見つかりませんでした。<br>別の国名を試してみてね！</p>
      </div>`;
    return;
  }
  document.getElementById('result').innerHTML = `<div class="loading"><div class="spinner"></div><p>しらべています…</p></div>`;
  setTimeout(() => renderCountry(key), 500);
}

function showGrid() {
  const filtered = Object.entries(COUNTRIES).filter(([,d]) =>

  const resultEl = document.getElementById('result');
  resultEl.innerHTML = '<div class="country-grid" id="countryGrid"></div>';

}

// ── Mic ──
function setupMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('micBtn');
  const hint = document.getElementById('micHint');
  if (!SR) { btn.style.opacity='0.4'; btn.disabled=true; return; }

  let r = null;
  let isRecording = false;

  function startRec() {
    // Safariのため毎回新しいインスタンスを生成
    r = new SR();
    r.lang = 'ja-JP';
    r.interimResults = false;
    r.maxAlternatives = 1;
    r.continuous = false;

    r.onstart = () => {
      isRecording = true;
      btn.classList.add('recording');
      hint.textContent = '🎙 聞いています… 国名を話してね';
    };
    r.onend = () => {
      isRecording = false;
      btn.classList.remove('recording');
      r = null;
    };
    r.onresult = e => {
      const t = e.results[0][0].transcript;
      document.getElementById('inp').value = t;
      hint.textContent = `「${t}」と認識しました`;
      setTimeout(() => search(t), 400);
    };
    r.onerror = e => {
      isRecording = false;
      btn.classList.remove('recording');
      r = null;
      if (e.error === 'not-allowed') {
        hint.textContent = '⚠ マイクの許可が必要です（設定→Safari→マイク）';
      } else if (e.error === 'no-speech') {
        hint.textContent = '⚠ 声が聞こえませんでした。もう一度どうぞ';
      } else {
        hint.textContent = '⚠ 認識できませんでした（' + e.error + '）';
      }
    };

    try {
      r.start();
    } catch(e) {
      isRecording = false;
      btn.classList.remove('recording');
      hint.textContent = '⚠ マイクを起動できませんでした';
      r = null;
    }
  }

  function stopRec() {
    if (r) {
      try { r.stop(); } catch(e) {}
    }
  }

  btn.onclick = () => {
    if (isRecording) {
      stopRec();
    } else {
      hint.textContent = '';
      startRec();
    }
  };
}

// ── PWA ──
function setupPWA() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    showInstallBanner();
  });
}

function showInstallBanner() {
  const b = document.getElementById('installBanner');
  b.style.display = 'flex';
  b.innerHTML = `
    <span class="icon">🌍</span>
    <div class="text">
      <strong>ホーム画面に追加しよう！</strong>
      アプリとして使えるよ
    </div>
    <button class="install-banner-close" id="installBtn">追加する</button>
    <button class="install-banner-x" id="closeBanner" aria-label="閉じる">×</button>`;
  document.getElementById('closeBanner').onclick = () => { b.style.display='none'; };
  document.getElementById('installBtn').onclick = async () => {
    if (!window._deferredPrompt) return;
    window._deferredPrompt.prompt();
    const { outcome } = await window._deferredPrompt.userChoice;
    b.style.display = 'none';
  };
}

function selectType(id) {

function startQuiz() {
  const diff = DIFFS.find(d=>d.id===quizState.diff);
  const allKeys = Object.keys(COUNTRIES);
  const shuffled = allKeys.sort(()=>Math.random()-0.5);
  const selected = shuffled.slice(0, diff.q);

  quizState.questions = selected.map(key => buildQuestion(key, quizState.type, diff.choices, allKeys));
  quizState.idx = 0;
  quizState.score = 0;
  quizState.streak = 0;
  quizState.maxStreak = 0;
  quizState.startTime = Date.now();
  renderQuestion();
}

function buildQuestion(answerKey, type, numChoices, allKeys) {
  const d = COUNTRIES[answerKey];
  let question, answerText, getChoiceText;

  if (type === 'flag') {
    question = `この国旗はどこの国？`;
    answerText = answerKey;
    getChoiceText = k => k;
  } else if (type === 'cap') {
    question = `${answerKey}（${d.flag}）の首都はどこ？`;
    answerText = d.cap;
    getChoiceText = k => COUNTRIES[k].cap;
  } else { // food
    const foodItem = d.food[Math.floor(Math.random()*d.food.length)];
    question = `「${foodItem}」はどこの国の料理？`;
    answerText = answerKey;
    getChoiceText = k => k;
  }

  // build wrong choices (avoid duplicates for cap quiz)
  const wrongKeys = allKeys.filter(k => {
    if (k === answerKey) return false;
    if (type === 'cap') return COUNTRIES[k].cap !== d.cap;
    return true;
  }).sort(()=>Math.random()-0.5).slice(0, numChoices-1);

  const choices = [answerKey, ...wrongKeys]
    .sort(()=>Math.random()-0.5)
    .map(k => ({ key:k, text: getChoiceText(k) }));

  return { type, answerKey, answerText, question, choices,
    displayFlag: d.flag, tip: getTip(answerKey, type) };
}

function renderQuestion() {
  const el = document.getElementById('quiz-inner');
  const diff = DIFFS.find(d=>d.id===quizState.diff);
  const total = quizState.questions.length;
  const q = quizState.questions[quizState.idx];
  const pct = (quizState.idx / total) * 100;
  const streakClass = quizState.streak >= 3 ? 'hot' : '';

  el.innerHTML = `
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-meta">
      <span style="font-weight:700">${quizState.idx+1} / ${total}問</span>
      <div class="streak-badge ${streakClass}">🔥 ${quizState.streak}連続正解</div>
      <span style="font-weight:800;color:var(--blue)">${quizState.score}pt</span>
    </div>

    <div class="q-card">
      ${q.type==='flag' ? `<div class="q-flag">${q.displayFlag}</div>` : ''}
      <div class="q-question">${q.question}</div>
      
    </div>

    <div class="choices" id="choices">
      ${q.choices.map((c,i)=>`
        <button class="choice-btn" id="ch-${i}" onclick="answer(${i},'${q.answerKey}')">
          ${q.type==='flag'||q.type==='food' ? c.text : c.text}
        </button>`).join('')}
    </div>
    <div id="feedback"></div>
  `;
}

function answer(choiceIdx, answerKey) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.idx];
  const chosen = q.choices[choiceIdx];
  const correct = chosen.key === answerKey;
  const diff = DIFFS.find(d=>d.id===quizState.diff);

  // Disable all buttons + color
  q.choices.forEach((c,i) => {
    const btn = document.getElementById('ch-'+i);
    btn.disabled = true;
    if (c.key === answerKey) btn.classList.add('reveal');
    if (i === choiceIdx && !correct) btn.classList.add('wrong');
  });

  // Score: base + streak bonus + diff bonus
  let pts = 0;
  if (correct) {
    quizState.streak++;
    quizState.maxStreak = Math.max(quizState.maxStreak, quizState.streak);
    const streakBonus = Math.min(quizState.streak-1, 5) * 10;
    const diffBonus = {easy:10, normal:20, hard:30}[quizState.diff];
    pts = diffBonus + streakBonus;
    quizState.score += pts;
  } else {
    quizState.streak = 0;
  }

  const fb = document.getElementById('feedback');
  const isLast = quizState.idx >= quizState.questions.length - 1;
  fb.innerHTML = `
    <div class="feedback-box ${correct?'correct-fb':'wrong-fb'}">
      <div class="feedback-title">${correct ? `🎉 せいかい！ +${pts}pt` : `❌ ざんねん…`}</div>
      <div class="feedback-tip">
        ${correct ? '' : `<b>正解：</b>${q.answerText}<br>`}
        💡 ${q.tip}
      </div>
    </div>
    <button class="next-btn" onclick="nextQuestion()">
      ${isLast ? '🏁 けっかを見る' : '次の問題へ →'}
    </button>
  `;
  quizState.answered = false;
  setTimeout(() => { document.getElementById('feedback')?.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 100);
}

function nextQuestion() {
  quizState.idx++;
  if (quizState.idx >= quizState.questions.length) {
    showResult();
  } else {
    renderQuestion();
    quizState.answered = false;
  }
}

function showResult() {
  const elapsed = Math.round((Date.now() - quizState.startTime) / 1000);
  const total = quizState.questions.length;
  const correct = quizState.questions.filter((_,i) => {
    // count by re-checking won't work; track separately
    return false;
  }).length;

  // Calculate correct answers from score
  const diff = DIFFS.find(d=>d.id===quizState.diff);
  const basePerQ = {easy:10,normal:20,hard:30}[quizState.diff];
  // Estimate: store correct count during game
  const correctCount = quizState._correct || 0;
  const pct = Math.round((quizState.score / (total * (basePerQ+25))) * 100);

  let stars = '⭐';
  let comment = 'もう一度挑戦してみよう！';
  if (quizState.score >= total * basePerQ * 0.9) { stars='🌟🌟🌟'; comment='かんぺき！すごい！！'; }
  else if (quizState.score >= total * basePerQ * 0.6) { stars='⭐⭐'; comment='よくできました！'; }
  else if (quizState.score >= total * basePerQ * 0.3) { stars='⭐'; comment='なかなかいいね！'; }

  const typeName = QUIZ_TYPES.find(t=>t.id===quizState.type)?.name || '';
  const mins = Math.floor(elapsed/60);
  const secs = elapsed % 60;
  const timeStr = mins > 0 ? `${mins}分${secs}秒` : `${secs}秒`;

  // Save to ranking
  const entry = {
    type: quizState.type,
    typeName,
    diff: quizState.diff,
    diffLabel: diff.label,
    score: quizState.score,
    streak: quizState.maxStreak,
    time: timeStr,
    date: new Date().toLocaleDateString('ja-JP'),
    total,
  };
  saveRankingEntry(entry);
  quizState.pendingScore = entry;

  const el = document.getElementById('quiz-inner');
  el.innerHTML = `
    <div class="result-screen">
      <div class="result-stars">${stars}</div>
      <div class="result-score">${quizState.score}</div>
      <div class="result-label">ポイント</div>
      <div class="result-comment">${comment}</div>
      <div class="result-stats">
        <div class="rs-cell"><div class="rs-val">${quizState.maxStreak}🔥</div><div class="rs-lbl">最高ストリーク</div></div>
        <div class="rs-cell"><div class="rs-val">${timeStr}</div><div class="rs-lbl">タイム</div></div>
        <div class="rs-cell"><div class="rs-val">${typeName}</div><div class="rs-lbl">クイズ種別</div></div>
      </div>

      <div class="name-input-wrap">
        <label>📝 ニックネームを入力してランキングに登録しよう！</label>
        <input class="name-input" id="playerName" type="text" placeholder="なまえを入れてね" maxlength="12">
        <button class="save-btn" onclick="saveScore()">ランキングに登録する 🏆</button>
      </div>
    </div>
    <div class="result-btns">
      <button class="result-btns btn-retry" style="flex:1;padding:13px;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;background:var(--blue);color:#fff;border:none;box-shadow:0 2px 8px rgba(41,128,217,0.3)" onclick="startQuiz()">もう一度 🔄</button>
      <button class="result-btns btn-menu" style="flex:1;padding:13px;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;background:var(--card);color:var(--text);border:1.5px solid var(--border)" onclick="renderQuizMenu()">メニューへ</button>
    </div>
  `;
}

// ═══════════════════════════════════════
// RANKING / STORAGE
// ═══════════════════════════════════════
const RANK_KEY = 'kuniapp_ranking_v2';
const STATS_KEY = 'kuniapp_stats_v1';

function getRanking() {
  try { return JSON.parse(localStorage.getItem(RANK_KEY)||'[]'); } catch(e){ return []; }
}
function saveRankingEntry(entry) {
  try {
    const stats = JSON.parse(localStorage.getItem(STATS_KEY)||'{"games":0,"bestStreak":0,"bestScore":0}');
    stats.games++;
    stats.bestStreak = Math.max(stats.bestStreak, entry.streak);
    stats.bestScore  = Math.max(stats.bestScore,  entry.score);
    localStorage.setItem(STATS_KEY, JSON.stringify(stats));
  } catch(e){}
}
function saveScore() {
  const name = (document.getElementById('playerName')?.value||'').trim() || 'なまえなし';
  if (!quizState.pendingScore) return;
  try {
    const ranking = getRanking();
    ranking.push({...quizState.pendingScore, name, ts: Date.now()});
    ranking.sort((a,b)=>b.score-a.score);
    localStorage.setItem(RANK_KEY, JSON.stringify(ranking.slice(0,100)));
    quizState.pendingScore = null;
    showPage('ranking');
  } catch(e){ alert('保存できませんでした'); }
}
function getTotalGames()  { try { return JSON.parse(localStorage.getItem(STATS_KEY)||'{}').games||0; } catch(e){return 0;} }
function getBestStreak()  { try { return JSON.parse(localStorage.getItem(STATS_KEY)||'{}').bestStreak||0; } catch(e){return 0;} }
function getBestScore()   { try { return JSON.parse(localStorage.getItem(STATS_KEY)||'{}').bestScore||0; } catch(e){return 0;} }

let rankTab = 'all';
function renderRanking() {
  const el = document.getElementById('ranking-inner');
  const all = getRanking();

  const typeFilter = rankTab === 'all' ? null : rankTab;
  const shown = typeFilter ? all.filter(r=>r.type===typeFilter) : all;

  const tabs = [
    {id:'all',  label:'すべて'},
    {id:'flag', label:'🚩国旗'},
    {id:'cap',  label:'🏛首都'},
    {id:'food', label:'🍜食べ物'},
  ];

  el.innerHTML = `
    <div class="sec-title"><i class="ti ti-trophy" style="color:#f1c40f"></i>ランキング</div>
    <div class="ranking-tabs">
      ${tabs.map(t=>`<button class="rtab ${rankTab===t.id?'active':''}" onclick="setRankTab('${t.id}')">${t.label}</button>`).join('')}
    </div>
    ${shown.length === 0
      ? `<div class="rank-empty"><div class="big">🏆</div><p>まだ記録がありません。<br>クイズに挑戦してみよう！</p></div>`
      : `<div class="ranking-list">
          ${shown.slice(0,20).map((r,i)=>{
            const numClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
            const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
            return `<div class="rank-item">
              <div class="rank-num ${numClass}">${medal}</div>
              <div class="rank-info">
                <div class="rank-name">${r.name}</div>
                <div class="rank-detail">${r.typeName}・${r.diffLabel}・${r.date}・🔥${r.streak}</div>
              </div>
              <div class="rank-score">${r.score}pt</div>
            </div>`;
          }).join('')}
        </div>`
    }
    <div style="margin-top:20px">
      <div class="sec-title"><i class="ti ti-chart-bar" style="color:var(--blue)"></i>じぶんの記録</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div class="rs-cell"><div class="rs-val">${getTotalGames()}</div><div class="rs-lbl">プレイ回数</div></div>
        <div class="rs-cell"><div class="rs-val">${getBestStreak()}</div><div class="rs-lbl">最高ストリーク</div></div>
        <div class="rs-cell"><div class="rs-val">${getBestScore()}</div><div class="rs-lbl">最高スコア</div></div>
      </div>
    </div>
    <button style="width:100%;margin-top:16px;padding:11px;border-radius:var(--radius-sm);background:var(--red-light);color:var(--red);border:1px solid #f5b8b8;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer" onclick="if(confirm('ランキングデータをすべて削除しますか？')){localStorage.removeItem('${RANK_KEY}');localStorage.removeItem('${STATS_KEY}');renderRanking()}">ランキングをリセット</button>
  `;
}

function setRankTab(id) { rankTab = id; renderRanking(); }

init();
</script>
